name: CI

# :local/root paths only resolve inside the monorepo checkout, so the test
# job reconstructs the workspace layout by checking out siblings (all
# PUBLIC) into the expected relative paths -- no token needed.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.4
        with: { cli: latest }
      - name: clj-kondo (errors fail the build)
        run: clojure -M:lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { path: orgs/cloud-itonami/cloud-itonami-isic-0162 }
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/langgraph
          path: orgs/kotoba-lang/langgraph
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/langchain
          path: orgs/kotoba-lang/langchain
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/langchain-store
          path: orgs/kotoba-lang/langchain-store
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.4
        with: { cli: latest }
      - name: test
        working-directory: orgs/cloud-itonami/cloud-itonami-isic-0162
        run: clojure -M:dev:test
